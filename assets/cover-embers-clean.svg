<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Premium animated ember cover">
  <defs>
    <!-- Match GitHub dark background -->
    <linearGradient id="fadeMask" x1="0" y1="300" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white"/>
      <stop offset="72%" stop-color="white"/>
      <stop offset="88%" stop-color="white" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <mask id="topFade">
      <rect width="1200" height="300" fill="url(#fadeMask)"/>
    </mask>

    <radialGradient id="emberSmall" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="24%" stop-color="#ffd59a"/>
      <stop offset="58%" stop-color="#ff9b3d"/>
      <stop offset="100%" stop-color="#ff6a1a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="emberLarge" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="22%" stop-color="#ffdca9"/>
      <stop offset="52%" stop-color="#ffad52"/>
      <stop offset="100%" stop-color="#ff6b1d" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="baseGlow" cx="50%" cy="100%" r="58%">
      <stop offset="0%" stop-color="#ff8a2b" stop-opacity="0.18"/>
      <stop offset="35%" stop-color="#ff6d1f" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff6d1f" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft1" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="1.8"/>
    </filter>

    <filter id="soft2" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="3.6"/>
    </filter>

    <filter id="soft3" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>

    <symbol id="sparkS" overflow="visible">
      <circle r="2.6" fill="url(#emberSmall)" filter="url(#soft1)"/>
      <circle r="0.8" fill="#fffdf7"/>
    </symbol>

    <symbol id="sparkM" overflow="visible">
      <ellipse rx="4.1" ry="3.2" fill="url(#emberLarge)" filter="url(#soft2)"/>
      <ellipse rx="1.15" ry="0.95" fill="#fff9ef"/>
    </symbol>

    <symbol id="sparkL" overflow="visible">
      <ellipse rx="6.3" ry="5" fill="url(#emberLarge)" filter="url(#soft3)"/>
      <ellipse rx="1.85" ry="1.45" fill="#fff8ec"/>
    </symbol>

    <style>
      .bg {
        fill: #0d1117;
      }

      .glowA {
        animation: glowPulseA 2.2s ease-in-out infinite;
        transform-origin: 50% 100%;
      }

      .glowB {
        animation: glowPulseB 3.1s ease-in-out infinite;
        transform-origin: 50% 100%;
      }

      @keyframes glowPulseA {
        0%, 100% { opacity: 0.72; transform: scale(1, 1); }
        50% { opacity: 1; transform: scale(1.03, 1.1); }
      }

      @keyframes glowPulseB {
        0%, 100% { opacity: 0.18; transform: scale(1, 1); }
        50% { opacity: 0.34; transform: scale(1.06, 1.12); }
      }

      @media (prefers-reduced-motion: reduce) {
        .glowA, .glowB { animation: none; }
      }
    </style>
  </defs>

  <rect class="bg" width="1200" height="300"/>

  <!-- subtle hidden bonfire glow below frame -->
  <ellipse class="glowB" cx="600" cy="336" rx="420" ry="124" fill="url(#baseGlow)"/>
  <ellipse class="glowA" cx="600" cy="330" rx="280" ry="88" fill="url(#baseGlow)"/>

  <g mask="url(#topFade)">
