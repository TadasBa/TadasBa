    </g>

    <!-- fine support sparks -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="160 214;160 200;160 184;161 166;160 146;160 124;160 100;159 74"
        dur="3.7s" begin="0.55s" repeatCount="indefinite"/>
      <g>
        <animate attributeName="opacity"
