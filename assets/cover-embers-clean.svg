<svg width="1200" height="210" viewBox="0 0 1200 210" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated ember cover">
  <defs>
    <linearGradient id="fadeMask" x1="0" y1="210" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white"/>
      <stop offset="62%" stop-color="white"/>
      <stop offset="84%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <mask id="topFade">
      <rect width="1200" height="210" fill="url(#fadeMask)"/>
    </mask>

    <radialGradient id="emberS" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7ef"/>
      <stop offset="18%" stop-color="#ffd7bd"/>
      <stop offset="38%" stop-color="#ff8b4a"/>
      <stop offset="68%" stop-color="#ef4b2d"/>
      <stop offset="100%" stop-color="#9f1d1d" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="emberM" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffaf4"/>
      <stop offset="14%" stop-color="#ffe2c8"/>
      <stop offset="34%" stop-color="#ff9a57"/>
      <stop offset="62%" stop-color="#f2552f"/>
      <stop offset="100%" stop-color="#8f1d1d" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="baseGlow" cx="50%" cy="100%" r="62%">
      <stop offset="0%" stop-color="#ff652e" stop-opacity="0.30"/>
      <stop offset="24%" stop-color="#df3d26" stop-opacity="0.18"/>
      <stop offset="52%" stop-color="#9f1d1d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#9f1d1d" stop-opacity="0"/>
    </radialGradient>

    <filter id="blur1" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>

    <filter id="blur2" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="2.8"/>
    </filter>

    <filter id="blur3" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="5.2"/>
    </filter>

    <symbol id="sparkSmall" overflow="visible">
      <circle r="2.2" fill="url(#emberS)" filter="url(#blur1)"/>
      <circle r="0.65" fill="#fff9f3"/>
    </symbol>

    <symbol id="sparkMedium" overflow="visible">
      <ellipse rx="3.8" ry="3" fill="url(#emberM)" filter="url(#blur2)"/>
      <ellipse rx="1.05" ry="0.9" fill="#fff8f1"/>
    </symbol>

    <symbol id="sparkLarge" overflow="visible">
      <ellipse rx="5.6" ry="4.6" fill="url(#emberM)" filter="url(#blur3)"/>
      <ellipse rx="1.6" ry="1.3" fill="#fff7ef"/>
    </symbol>

    <style>
      .bg { fill: #0d1117; }

      .glowA {
        animation: glowA 1.25s ease-in-out infinite;
        transform-origin: 50% 100%;
      }

      .glowB {
        animation: glowB 1.8s ease-in-out infinite;
        transform-origin: 50% 100%;
      }

      @keyframes glowA {
        0%, 100% { opacity: 0.66; transform: scale(1,1); }
        50% { opacity: 1; transform: scale(1.05,1.17); }
      }

      @keyframes glowB {
        0%, 100% { opacity: 0.18; transform: scale(1,1); }
        50% { opacity: 0.38; transform: scale(1.1,1.22); }
      }

      @media (prefers-reduced-motion: reduce) {
        .glowA, .glowB { animation: none; }
      }
    </style>
  </defs>

  <rect class="bg" width="1200" height="210"/>

  <!-- hidden fire glow below frame -->
  <ellipse class="glowB" cx="600" cy="228" rx="440" ry="82" fill="url(#baseGlow)"/>
  <ellipse class="glowA" cx="600" cy="222" rx="280" ry="58" fill="url(#baseGlow)"/>

  <g mask="url(#topFade)">
    <!-- ember 1 -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="110 214;112 186;111 156;113 126;112 94;111 62;111 30;110 4"
        dur="6.9s" begin="0s" repeatCount="indefinite"/>
      <g>
        <animate attributeName="opacity"
          values="0;1;0.92;0.86;0.72;0.54;0.26;0"
          dur="6.9s" begin="0s" repeatCount="indefinite"/>
        <g>
          <animateTransform attributeName="transform" type="scale"
            values="0.38;1.06;0.82;1.02;0.88;0.96;0.76"
            dur="0.62s" begin="0s" repeatCount="indefinite"/>
          <use href="#sparkLarge"/>
        </g>
      </g>
    </g>

    <!-- ember 2 -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="206 214;207 194;206 172;208 148;207 122;206 96;206 70;205 42"
        dur="4.4s" begin="0.7s" repeatCount="indefinite"/>
      <g>
        <animate attributeName="opacity"
          values="0;0.92;0.84;0.78;0.64;0.46;0.18;0"
          dur="4.4s" begin="0.7s" repeatCount="indefinite"/>
        <g>
          <animateTransform attributeName="transform" type="scale"
            values="0.24;0.92;0.72;0.94;0.82;0.9;0.68"
            dur="0.46s" begin="0.7s" repeatCount="indefinite"/>
          <use href="#sparkMedium"/>
        </g>
      </g>
    </g>

    <!-- ember 3 -->
