          values="0.35;1;0.95;0.74;0.38;0.14"
          dur="6.4s" begin="0s" repeatCount="indefinite"/>
        <animate attributeName="opacity"
          values="0;0.95;0.88;0.66;0.24;0"
          dur="6.4s" begin="0s" repeatCount="indefinite"/>
        <use href="#sparkM"/>
