        dur="5.6s" begin="0.2s" repeatCount="indefinite"/>
      <g>
        <animate attributeName="opacity"
          values="0;0.96;0.88;0.82;0.68;0.5;0.2;0"
          dur="5.6s" begin="0.2s" repeatCount="indefinite"/>
        <g>
