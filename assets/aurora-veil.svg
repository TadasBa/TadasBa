<svg width="1200" height="210" viewBox="0 0 1200 210" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aurora curtains hanging directly on the page">
  <defs>
    <linearGradient id="av-1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3df5c4" stop-opacity="0"/><stop offset="45%" stop-color="#2ee6a6" stop-opacity=".75"/>
      <stop offset="75%" stop-color="#12a3c9" stop-opacity=".45"/><stop offset="100%" stop-color="#0d5bd6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="av-2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0"/><stop offset="50%" stop-color="#6d5cf6" stop-opacity=".62"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="av-3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0"/><stop offset="55%" stop-color="#10b981" stop-opacity=".58"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="av-fadex" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/><stop offset="10%" stop-color="#fff"/>
      <stop offset="90%" stop-color="#fff"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="av-fadey" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/><stop offset="14%" stop-color="#fff"/>
      <stop offset="72%" stop-color="#fff"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <mask id="av-mask"><rect width="1200" height="210" fill="url(#av-fadex)"/></mask>
    <mask id="av-masky"><rect width="1200" height="210" fill="url(#av-fadey)"/></mask>
    <filter id="av-turb" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008 0.02" numOctaves="2" seed="7" result="n">
        <animate attributeName="baseFrequency" values="0.008 0.02;0.014 0.03;0.008 0.02" dur="19s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="36" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .av-c{filter:url(#av-turb)}
      .av-d1{animation:avd1 21s ease-in-out infinite}
      .av-d2{animation:avd2 27s ease-in-out infinite}
      .av-d3{animation:avd3 24s ease-in-out infinite}
      @keyframes avd1{0%,100%{transform:translateX(-42px) scaleY(1);opacity:.8}50%{transform:translateX(48px) scaleY(1.14);opacity:1}}
      @keyframes avd2{0%,100%{transform:translateX(56px) scaleY(1.08);opacity:.75}50%{transform:translateX(-50px) scaleY(.9);opacity:1}}
      @keyframes avd3{0%,100%{transform:translateX(-24px) scaleY(.96);opacity:.85}50%{transform:translateX(34px) scaleY(1.16);opacity:.65}}
      @media (prefers-reduced-motion:reduce){.av-d1,.av-d2,.av-d3{animation:none}}
    </style>
